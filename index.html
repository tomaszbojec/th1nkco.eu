<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThinkCo</title>
  <meta name="description" content="ThinkCo — Urban Research Lab. New beginning incoming.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,900;1,900&family=IBM+Plex+Mono:wght@400;500&family=Instrument+Serif&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #f5f4f0; color: #0a0a0a; overflow: hidden; }
    .page { width: 100vw; height: 100vh; padding: 36px 44px; display: flex; flex-direction: column; justify-content: space-between; }
    .top { display: flex; justify-content: space-between; align-items: flex-start; opacity: 0; animation: fadeUp 0.7s ease forwards 0.1s; }
    .logo { width: 110px; display: block; }
    .top-right { font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; letter-spacing: 0.18em; text-transform: uppercase; line-height: 1.9; text-align: right; color: #666; }
    .headline { flex: 1; display: flex; flex-direction: column; justify-content: center; padding: 20px 0; }
    .main-title { display: block; }
    .main-line { display: block; font-family: 'Barlow Condensed', sans-serif; font-weight: 900; font-size: clamp(62px, 9vw, 135px); line-height: 0.88; text-transform: uppercase; letter-spacing: -0.025em; color: #0a0a0a; opacity: 0; animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
    .main-line:nth-child(1) { animation-delay: 0.25s; }
    .main-line:nth-child(2) { animation-delay: 0.4s; font-style: italic; }
    .sub { display: block; font-family: 'Instrument Serif', serif; font-size: clamp(42px, 6.2vw, 93px); line-height: 1; letter-spacing: -0.01em; color: #0a0a0a; margin-top: 6px; opacity: 0; animation: fadeUp 0.7s ease forwards 0.6s; }

    @media (min-width: 601px) {
      .main-title { white-space: nowrap; }
      .main-line { display: inline; font-size: clamp(96px, 13.2vw, 216px); }
      .main-line:nth-child(1)::after { content: ' '; }
      .sub { font-size: clamp(72px, 10.2vw, 156px); margin-top: 10px; }
      .headline-inner { display: flex; align-items: flex-end; justify-content: space-between; width: 100%; }
      .headline-left { display: flex; flex-direction: column; }
      .countdown { margin-top: 0; flex-direction: row; gap: 24px; align-items: flex-end; flex-shrink: 0; }
      .countdown-unit { align-items: flex-end; }
      .countdown-number { font-size: clamp(19px, 2.6vw, 38px); }
      .countdown-label { margin-top: 0; }
    }
    .countdown { display: flex; gap: 28px; margin-top: 24px; opacity: 0; animation: fadeUp 0.7s ease forwards 0.8s; }
    .countdown-unit { display: flex; flex-direction: column; align-items: flex-start; }
    .countdown-number { font-family: 'IBM Plex Mono', monospace; font-size: clamp(16px, 2.2vw, 32px); font-weight: 500; color: #0a0a0a; line-height: 1; }
    .countdown-label { font-family: 'IBM Plex Mono', monospace; font-size: 8px; letter-spacing: 0.2em; text-transform: uppercase; color: #999; margin-top: 4px; }
    .divider { height: 1px; background: #0a0a0a; transform-origin: left; transform: scaleX(0); animation: expandLine 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards 1s; margin-bottom: 16px; }
    .bottom { display: flex; justify-content: flex-end; opacity: 0; animation: fadeUp 0.7s ease forwards 1.1s; }
    .bottom-right { font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; letter-spacing: 0.16em; text-align: right; line-height: 2; color: #666; }
    .bottom-right a { color: #0a0a0a; text-decoration: none; transition: opacity 0.2s; }
    .bottom-right a:hover { opacity: 0.4; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes expandLine { to { transform: scaleX(1); } }
    @media (max-width: 600px) {
      .page { padding: 24px; }
      .logo { width: 80px; }
      .main-line { font-size: clamp(60px, 18vw, 80px); }
      .sub { font-size: clamp(36px, 11vw, 56px); }
      .countdown { gap: 18px; }
    }
  </style>
</head>
<body>
<div class="page">
  <div class="top">
    <img class="logo" src="ThinkCo_Logo-02.png" alt="ThinkCo">
    <div class="top-right">Urban Research Lab<br>Est. 2018</div>
  </div>
  <div class="headline">
    <div class="headline-inner">
      <div class="headline-left">
        <div class="main-title">
          <span class="main-line">New</span><span class="main-line"> Beginning.</span>
        </div>
        <span class="sub">Brace yourself.</span>
      </div>
      <div class="countdown">
        <div class="countdown-unit"><span class="countdown-number" id="cd-days">--</span><span class="countdown-label">Days</span></div>
        <div class="countdown-unit"><span class="countdown-number" id="cd-hours">--</span><span class="countdown-label">Hours</span></div>
        <div class="countdown-unit"><span class="countdown-number" id="cd-mins">--</span><span class="countdown-label">Min</span></div>
        <div class="countdown-unit"><span class="countdown-number" id="cd-secs">--</span><span class="countdown-label">Sec</span></div>
      </div>
    </div>
  </div>
  <div>
    <div class="divider"></div>
    <div class="bottom">
      <div class="bottom-right"><a href="mailto:hello@th1nkco.eu">hello@th1nkco.eu</a><br>+48 791 527 266</div>
    </div>
  </div>
</div>
<script>
  const target = new Date('2026-05-05T10:00:00');
  function update() {
    const diff = target - new Date();
    if (diff <= 0) { ['cd-days','cd-hours','cd-mins','cd-secs'].forEach(id => document.getElementById(id).textContent = '00'); return; }
    const d = Math.floor(diff / 86400000);
    const h = Math.floor((diff % 86400000) / 3600000);
    const m = Math.floor((diff % 3600000) / 60000);
    const s = Math.floor((diff % 60000) / 1000);
    document.getElementById('cd-days').textContent  = String(d).padStart(2,'0');
    document.getElementById('cd-hours').textContent = String(h).padStart(2,'0');
    document.getElementById('cd-mins').textContent  = String(m).padStart(2,'0');
    document.getElementById('cd-secs').textContent  = String(s).padStart(2,'0');
  }
  update();
  setInterval(update, 1000);
</script>
</body>
</html>
